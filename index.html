
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Prep</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:#0d6efd;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin:0 10px;
}

.hero{
background:linear-gradient(135deg,#0d6efd,#00b4d8);
color:white;
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:42px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
margin-bottom:25px;
}

.btn{
background:white;
color:#0d6efd;
padding:12px 25px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.services{
padding:60px 20px;
}

.section-title{
text-align:center;
font-size:32px;
margin-bottom:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
text-align:center;
}

.card h3{
margin:15px 0;
color:#0d6efd;
}

.tracking{
background:white;
padding:60px 20px;
text-align:center;
}

.tracking input{
width:300px;
max-width:90%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
}

.tracking button{
padding:12px 20px;
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

footer{
background:#111827;
color:white;
text-align:center;
padding:25px;
margin-top:50px;
}
</style>
</head>

<body>

<header>
<div class="logo">Quick Prep</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#">الخدمات</a>
<a href="#">التتبع</a>
<a href="#">اتصل بنا</a>
</nav>
</header>

<section class="hero">
<h1>خدمة شحن وتحضير احترافية</h1>
<p>حلول سريعة وآمنة لإدارة وشحن الطلبات</p>
<button class="btn">ابدأ الآن</button>
</section>

<section class="services">
<h2 class="section-title">خدماتنا</h2>

<div class="cards">

<div class="card">
<h3>شحن سريع</h3>
<p>توصيل سريع وآمن لجميع المحافظات.</p>
</div>

<div class="card">
<h3>تتبع مباشر</h3>
<p>اعرف مكان شحنتك في أي وقت.</p>
</div>

<div class="card">
<h3>دعم فني</h3>
<p>فريق دعم متواجد على مدار الساعة.</p>
</div>

</div>
</section>

<section class="tracking">
<h2>تتبع الشحنة</h2>
<br>
<input type="text" placeholder="أدخل رقم الشحنة">
<button>بحث</button>
</section>

<footer>
© 2025 Quick Prep - جميع الحقوق محفوظة
</footer>

</body>
</html>
